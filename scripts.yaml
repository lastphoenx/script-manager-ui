# Script Manager UI - Script Definitions
# Jedes Skript wird hier mit Namen, Pfad, Parametern und Metadaten definiert.

scripts:
  # ==================== pCloud Tools ====================
  
  - name: "pCloud Quick Delta"
    description: "Schnelle Tamper-Detection für pCloud-Backups"
    cmd: "python3"
    args: ["pcloud_quick_delta.py"]
    cwd: "/opt/pcloud-tools"
    category: "pCloud"
    tags: ["backup", "verification", "pcloud"]
    estimated_duration: "2-5min"
    risk_level: "low"
    params:
      - name: dest_root
        type: string
        label: "pCloud Basispfad"
        help: "z.B. /Backup/rtb_1to1"
        required: true
        default: "/Backup/rtb_1to1"
      
      - name: index_file
        type: string
        label: "Index-Datei"
        help: "content_index.json oder Archive z.B. 2026-04-10-075334_index.json"
        required: false
        default: "content_index.json"
      
      - name: backfill_check
        type: bool
        label: "SHA256 Backfill-Check"
        help: "Gründlicherer Check für Lücken (langsamer)"
        default: false
      
      - name: backfill_sample
        type: int
        label: "Backfill Stichprobe"
        help: "Anzahl Nodes (0 = alle)"
        default: 0
        min: 0
      
      - name: json_out
        type: path
        label: "JSON Report Ausgabe"
        help: "Optional: Report als JSON speichern"
        required: false

  - name: "pCloud JSON Manifest"
    description: "Lokales Snapshot-Manifest erzeugen"
    cmd: "python3"
    args: ["pcloud_json_manifest.py"]
    cwd: "/opt/pcloud-tools"
    category: "pCloud"
    tags: ["backup", "manifest", "pcloud"]
    estimated_duration: "10-30min"
    risk_level: "low"
    params:
      - name: source_root
        type: path
        label: "Quellverzeichnis"
        help: "Lokaler Pfad zum Scannen"
        required: true
        default: "/mnt/backup"
      
      - name: output
        type: path
        label: "Ausgabe JSON"
        help: "Pfad zur Manifest-Datei"
        required: true
        default: "/tmp/manifest.json"
      
      - name: workers
        type: int
        label: "Worker-Prozesse"
        help: "Anzahl paralleler Hash-Worker"
        default: 4
        min: 1
        max: 16

  - name: "pCloud Manifest Diff"
    description: "Vergleicht zwei Manifeste und zeigt Unterschiede"
    cmd: "python3"
    args: ["pcloud_manifest_diff.py"]
    cwd: "/opt/pcloud-tools"
    category: "pCloud"
    tags: ["backup", "diff", "pcloud"]
    estimated_duration: "1-2min"
    risk_level: "low"
    params:
      - name: old
        type: path
        label: "Altes Manifest"
        required: true
      
      - name: new
        type: path
        label: "Neues Manifest"
        required: true
      
      - name: output
        type: select
        label: "Ausgabeformat"
        options: ["text", "json"]
        default: "text"

  # ==================== EntropyWatcher ====================
  
  - name: "EntropyWatcher Scan"
    description: "Delta-Scan: nur neue/geänderte Dateien prüfen"
    cmd: "python3"
    args: ["entropywatcher.py", "scan"]
    cwd: "/opt/entropywatcher"
    category: "Security"
    tags: ["entropy", "security", "monitoring"]
    estimated_duration: "5-15min"
    risk_level: "low"
    env_file: "/opt/entropywatcher/common.env"
    params:
      - name: paths
        type: string
        label: "Scan-Pfade (kommagetrennt)"
        help: "z.B. /srv/nas,/mnt/data"
        required: true
      
      - name: env
        type: select
        label: "Zusätzliche Umgebung"
        help: "Optionale .env-Datei für Quelle"
        options: ["", "nas.env", "os.env"]
        default: ""

  - name: "EntropyWatcher Initial Scan"
    description: "Einmaliger Basis-Scan (Baseline setzen)"
    cmd: "python3"
    args: ["entropywatcher.py", "init-scan"]
    cwd: "/opt/entropywatcher"
    category: "Security"
    tags: ["entropy", "security", "init"]
    estimated_duration: "30-90min"
    risk_level: "medium"
    env_file: "/opt/entropywatcher/common.env"
    params:
      - name: paths
        type: string
        label: "Scan-Pfade (kommagetrennt)"
        required: true
      
      - name: force
        type: bool
        label: "Force (DB überschreiben)"
        help: "Erzwingt Vollscan auch bei existierenden Einträgen"
        default: false
      
      - name: env
        type: select
        label: "Zusätzliche Umgebung"
        options: ["", "nas.env", "os.env"]
        default: ""

  - name: "EntropyWatcher AV Scan"
    description: "ClamAV-Scan über angegebene Pfade"
    cmd: "python3"
    args: ["entropywatcher.py", "av-scan"]
    cwd: "/opt/entropywatcher"
    category: "Security"
    tags: ["antivirus", "clamav", "security"]
    estimated_duration: "15-60min"
    risk_level: "low"
    env_file: "/opt/entropywatcher/common.env"
    params:
      - name: paths
        type: string
        label: "Scan-Pfade (kommagetrennt)"
        required: true
      
      - name: env
        type: select
        label: "Zusätzliche Umgebung"
        options: ["", "nas-av.env", "os-av.env"]
        default: ""

  - name: "EntropyWatcher Report"
    description: "Zeigt Scan-Ergebnisse und Status"
    cmd: "python3"
    args: ["entropywatcher.py", "report"]
    cwd: "/opt/entropywatcher"
    category: "Security"
    tags: ["entropy", "report"]
    estimated_duration: "<1min"
    risk_level: "low"
    env_file: "/opt/entropywatcher/common.env"
    params:
      - name: only_flagged
        type: bool
        label: "Nur verdächtige Dateien"
        default: false
      
      - name: since_missing
        type: bool
        label: "Fehlende Dateien zeigen"
        default: false
      
      - name: source
        type: select
        label: "Quelle filtern"
        options: ["", "os", "nas"]
        default: ""
      
      - name: export
        type: path
        label: "Export-Datei (optional)"
        help: "CSV oder JSON Export"
        required: false
      
      - name: format
        type: select
        label: "Export-Format"
        options: ["csv", "json"]
        default: "csv"

  - name: "EntropyWatcher DB Report"
    description: "Vordefinierte DB-Reports (Status, AV-Events, etc.)"
    cmd: "python3"
    args: ["entropywatcher.py", "db-report"]
    cwd: "/opt/entropywatcher"
    category: "Security"
    tags: ["entropy", "database", "report"]
    estimated_duration: "<1min"
    risk_level: "low"
    env_file: "/opt/entropywatcher/common.env"
    params:
      - name: what
        type: select
        label: "Report-Typ"
        options: ["status", "flagged", "av", "summary", "missing", "recent", "last-runs"]
        default: "status"
      
      - name: source
        type: string
        label: "Quelle filtern (optional)"
        help: "z.B. os, nas, os-av"
        required: false
      
      - name: hours
        type: int
        label: "Zeitfenster (Stunden)"
        default: 24
        min: 1
      
      - name: limit
        type: int
        label: "Max. Zeilen"
        default: 50
        min: 1

  # ==================== RTB (Rsync Time Backup) ====================
  
  - name: "RTB Wrapper"
    description: "Rsync Time Backup mit Wrapper (nur bei Änderungen)"
    cmd: "/bin/bash"
    args: ["rtb_wrapper.sh"]
    cwd: "/opt/rtb"
    category: "Backup"
    tags: ["rsync", "backup", "snapshot"]
    estimated_duration: "5-30min"
    risk_level: "high"
    params:
      - name: dry_run
        type: bool
        label: "Dry Run (Testmodus)"
        help: "Führt nur Simulation aus"
        default: true
        locked: true
      
      - name: source
        type: path
        label: "Quellverzeichnis"
        required: true
      
      - name: destination
        type: path
        label: "Zielverzeichnis"
        required: true

# Parameter-Typen:
# - string: Einfaches Textfeld
# - int: Zahleneingabe (mit min/max)
# - bool: Checkbox
# - path: Textfeld mit Pfad-Validierung
# - select: Dropdown (options erforderlich)
# - password: Passwort-Feld (masked)
