# Script Manager UI - Pool-Mode Script Definitions
# Focus: Pool backup (RTB + pCloud Pool), verification, restore, GC, monitoring
# Excluded: Pipeline scripts (manifest/upload) — run via systemd.timer
# Legacy 1:1 tools removed (rtb_1to1, pcloud_restore, integrity_check, etc.)

scripts:
  # ==================== RECOVERY ====================

  - name: "Pool Restore"
    description: "Datei/Ordner aus Pool-Backup (Stubs/pool_refs) nach /srv/nas/restore wiederherstellen"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pool_restore.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Recovery"
    tags: ["pool", "backup", "restore", "recovery"]
    estimated_duration: "1-15min"
    risk_level: "low"
    params:
      - name: env-file
        type: path
        label: ".env Datei"
        default: "/opt/apps/pcloud-tools/main/.env"
        required: true

      - name: pool_root
        type: string
        label: "Pool-Root (pCloud)"
        help: "Remote Pool-Root, z.B. /Backup/rtb_pool"
        default: "/Backup/rtb_pool"
        required: true

      - name: list-snapshots
        type: bool
        label: "Snapshots auflisten"
        help: "Verfuegbare Snapshots anzeigen und beenden"
        default: false

      - name: snapshot
        type: string
        label: "Snapshot-Name"
        help: "z.B. 2026-06-10-040013"
        required: false

      - name: relpath
        type: string
        label: "Relativer Pfad (einzelne Datei)"
        help: "Stub-Weg innerhalb des Snapshots"
        required: false

      - name: filter
        type: string
        label: "Pfad-Praefix-Filter"
        help: "Nur Relpaths mit diesem Praefix"
        required: false

      - name: out-dir
        type: path
        label: "Restore-Zielverzeichnis"
        default: "/srv/nas/restore"
        required: false

      - name: download
        type: bool
        label: "Download ausfuehren"
        help: "false = nur Plan anzeigen"
        default: false

      - name: verify
        type: bool
        label: "SHA256 nach Download pruefen"
        default: true

      - name: allow-incomplete
        type: bool
        label: "Unvollstaendige Snapshots erlauben"
        default: false

      - name: all-versions
        type: bool
        label: "Alle Snapshot-Versionen"
        help: "Timeline + Restore ueber alle Snapshots (--relpath oder --filter). Ohne --snapshot."
        default: false

      - name: only-changed
        type: bool
        label: "Nur geaenderte Versionen laden"
        help: "Bei All-Versions-Download: Snapshots mit gleichem SHA wie Vorgaenger ueberspringen"
        default: false

  # ==================== BACKUP ====================

  - name: "RTB Backup"
    description: "RTB Snapshot + pCloud Pool-Upload (POOL-MODE via rtb_pool_wrapper.sh)"
    cmd: "/bin/bash"
    args: ["rtb_pool_wrapper.sh"]
    cwd: "/opt/apps/rtb"
    category: "Backup"
    tags: ["backup", "rsync", "snapshot", "pool"]
    estimated_duration: "5-30min"
    risk_level: "high"
    params:
      - name: check-only
        type: bool
        label: "Check-Only (Dry Run)"
        help: "Nur Aenderungspruefung, kein Lock, kein Backup"
        default: true

      - name: force
        type: bool
        label: "Force Backup"
        help: "Safety-Gate ueberspringen (--force)"
        default: false

      - name: upload-only
        type: path
        label: "Upload-Only: Snapshot-Pfad (optional)"
        help: "Bestehenden RTB-Snapshot nach pCloud hochladen ohne neues RTB-Backup"
        required: false

  - name: "RTB Delta Report"
    description: "rsync Dry-Run gegen latest RTB-Snapshot — Aenderungen nach Top-Level-Ordnern gruppiert (read-only)"
    cmd: "/bin/bash"
    args: ["rtb_delta_report.sh"]
    cwd: "/opt/apps/rtb"
    category: "Analysis"
    tags: ["rsync", "rtb", "delta", "dry-run"]
    estimated_duration: "2-15min"
    risk_level: "low"
    params:
      - name: top-n
        type: int
        label: "Top Ordner (Gruppierung)"
        help: "Wie viele Top-Level-Ordner in der Uebersicht (nach Anzahl Delta-Zeilen)"
        default: 20
        min: 1
        max: 100

      - name: full-listing
        type: bool
        label: "Alle Delta-Zeilen anzeigen"
        help: "Zusaetzlich jede rsync-Zeile ausgeben (kann sehr lang sein)"
        default: false

      - name: source
        type: path
        label: "Quellverzeichnis"
        default: "/srv/nas"
        required: false

      - name: rtb-root
        type: path
        label: "RTB-Verzeichnis"
        default: "/mnt/backup/rtb_nas"
        required: false

  - name: "microSD Raw Image Backup (dd)"
    description: "Erstellt ein 1:1 Raw-Image der microSD nach /mnt/backup (destruktiv bei falschem Device)"
    cmd: "sudo"
    args:
      - "bash"
      - "-lc"
      - "OUT_PATH=\"$1\"; if [ -z \"$OUT_PATH\" ]; then OUT_PATH=\"/mnt/backup/rpi5-Radxa_SATA_HAT_microsd-live-backup-$(date +%Y%m%d-%H%M%S).img\"; fi; OUT_PATH=\"${OUT_PATH/AUTO_TIMESTAMP/$(date +%Y%m%d-%H%M%S)}\"; dd if=/dev/mmcblk0 of=\"$OUT_PATH\" bs=4M status=progress conv=fsync"
      - "_"
    cwd: "/opt/apps"
    category: "Backup"
    tags: ["backup", "image", "dd", "high-risk"]
    estimated_duration: "10-60min"
    risk_level: "high"
    params:
      - name: output-path
        type: path
        label: "Output Image Pfad"
        help: "Default: /mnt/backup/rpi5-Radxa_SATA_HAT_microsd-live-backup-AUTO_TIMESTAMP.img"
        default: "/mnt/backup/rpi5-Radxa_SATA_HAT_microsd-live-backup-AUTO_TIMESTAMP.img"
        required: false
        arg_mode: positional

      - name: highrisk
        type: bool
        label: "HIGH RISK bestaetigt"
        help: "Pflicht: dd liest raw vom Blockdevice"
        default: false
        ui_only: true
        required: true

  # ==================== VERIFICATION & INTEGRITY ====================

  - name: "Pool Audit Status"
    description: "Schneller Status: RTB vs. Manifeste vs. pCloud (.upload_complete) vs. MariaDB"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pool_audit_status.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["pool", "status", "monitoring", "audit"]
    estimated_duration: "1-3min"
    risk_level: "low"
    params:
      - name: env-file
        type: path
        label: ".env Datei"
        default: "/opt/apps/pcloud-tools/main/.env"
        required: true

      - name: pool_root
        type: string
        label: "Pool-Root (pCloud)"
        default: "/Backup/rtb_pool"
        required: true

      - name: rtb-root
        type: path
        label: "RTB-Verzeichnis (lokal)"
        default: "/mnt/backup/rtb_nas"
        required: false

      - name: manifests-dir
        type: path
        label: "Manifest-Verzeichnis"
        default: "/srv/pcloud-archive/manifests"
        required: false

      - name: skip-db
        type: bool
        label: "MariaDB ueberspringen"
        default: false

      - name: workers
        type: int
        label: "Parallele Remote-Checks"
        default: 8
        min: 1
        max: 32

  - name: "Pool Verify Backup"
    description: "Vollstaendiger Integritaetscheck: lokale Manifeste vs. Remote Pool + Stubs"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pool_verify_backup.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["pool", "verification", "integrity"]
    estimated_duration: "5-30min"
    risk_level: "low"
    params:
      - name: env-file
        type: path
        label: ".env Datei"
        default: "/opt/apps/pcloud-tools/main/.env"
        required: true

      - name: pool_root
        type: string
        label: "Pool-Root (pCloud)"
        default: "/Backup/rtb_pool"
        required: true

      - name: manifests-dir
        type: path
        label: "Manifest-Verzeichnis"
        default: "/srv/pcloud-archive/manifests"
        required: false

      - name: stub-sample
        type: int
        label: "Stub-Stichprobe (0 = alle)"
        default: 0
        min: 0

  - name: "Pool Check Remote"
    description: "Read-only: pCloud-Index, Pool-SHAs, optional ein Snapshot (.upload_complete + Stub-Anzahl)"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pool_check_remote.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["pool", "verification", "remote", "snapshot"]
    estimated_duration: "1-5min"
    risk_level: "low"
    params:
      - name: env-file
        type: path
        label: ".env Datei"
        default: "/opt/apps/pcloud-tools/main/.env"
        required: true

      - name: dest-root
        type: string
        label: "Pool-Root (pCloud)"
        help: "Remote Pool-Root, z.B. /Backup/rtb_pool"
        default: "/Backup/rtb_pool"
        required: true

      - name: snapshot
        type: string
        label: "Snapshot-Name (optional)"
        help: "z.B. 2026-06-14-120015 — prueft .upload_complete und Stub-Anzahl"
        required: false

  - name: "Pool Check Local"
    description: "Read-only: Archiv-Manifest und lokaler Master-Index (content_index_master.json)"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pool_check_local.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["pool", "verification", "local", "manifest"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: manifest
        type: path
        label: "Manifest JSON (optional)"
        help: "z.B. /srv/pcloud-archive/manifests/2026-06-14-120015.json"
        required: false

      - name: master-index
        type: path
        label: "Master-Index"
        default: "/srv/pcloud-archive/indexes/content_index_master.json"
        required: false

  # ==================== MAINTENANCE ====================

  - name: "pCloud Pool GC"
    description: >
      Wartung des deduplizierten pCloud-Pools. Drei Betriebsarten (nur eine Retention-Option
      auf Ja setzen): (1) Prognose = nur anzeigen, (2) Retention = alte Remote-Snapshots
      entfernen, (3) Standard = beide Retention-Optionen Nein → nur verwaiste Pool-Dateien
      löschen. Immer zuerst mit Probelauf (Dry-Run) testen!
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "pcloud_pool_gc.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Maintenance"
    tags: ["pool", "gc", "retention", "high-risk"]
    estimated_duration: "2-60min"
    risk_level: "high"
    params:
      - name: env-file
        type: path
        label: "Zugangsdaten (.env)"
        help: "pCloud-Login und Pfade; Standard auf pi-nas"
        default: "/opt/apps/pcloud-tools/main/.env"
        required: true

      - name: pool_root
        type: string
        label: "Pool auf pCloud"
        help: "Wurzel des Pool-Backups remote, z. B. /Backup/rtb_pool (_pool + _snapshots)"
        default: "/Backup/rtb_pool"
        required: true

      - name: retention-forecast
        type: bool
        label: "Modus: Retention-Prognose (nur lesen)"
        help: "Vergleicht lokales RTB mit Remote-Snapshots. Zeigt, was wegfallen würde und wie viel Pool-Speicher frei wäre — ohne zu löschen. Retention ausführen = Nein."
        default: false

      - name: retention-apply
        type: bool
        label: "Modus: Retention ausführen (löschen)"
        help: "Löscht Remote-Snapshots, die lokal im RTB nicht mehr existieren, und bereinigt den Index. Mit Probelauf zuerst testen. Prognose = Nein."
        default: false

      - name: rtb-root
        type: path
        label: "Lokales RTB (Referenz für Retention)"
        help: "Snapshot-Ordner unter diesem Pfad gelten als „soll existieren“. Nur bei Prognose oder Retention relevant."
        default: "/mnt/backup/rtb_nas"
        required: false

      - name: run-gc
        type: bool
        label: "Danach Pool-GC starten"
        help: "Nach Retention-Löschung sofort verwaiste Dateien im _pool/ entfernen. Nur mit Retention ausführen=Ja und Probelauf=Nein."
        default: false

      - name: dry-run
        type: bool
        label: "Probelauf (nichts löschen)"
        help: "Empfohlen: zeigt geplante Löschungen in der Ausgabe, ändert nichts auf pCloud."
        default: true

      - name: grace-hours
        type: int
        label: "Wartezeit vor Pool-Löschung (Stunden)"
        help: "Nur Standard-GC (beide Retention-Modi Nein): Pool-Dateien müssen so alt sein, bevor sie gelöscht werden. Schützt vor Rennen mit laufendem Backup. 0 = aus."
        default: 24
        min: 0
        max: 168

      - name: audit-mode
        type: bool
        label: "Tiefenprüfung Index vs. Stubs"
        help: "Langsam: liest Stub-Dateien statt nur den Index. Nur für Standard-GC, nicht mit Retention-Prognose/-Ausführung kombinieren."
        default: false

      - name: verbose
        type: bool
        label: "Ausführliches Log"
        help: "Jede betroffene Datei einzeln in der Ausgabe"
        default: false

      - name: highrisk
        type: bool
        label: "Löschung bewusst bestätigt"
        help: "Pflicht-Haken, wenn Probelauf aus und echte Löschung (Retention oder GC) läuft"
        default: false
        ui_only: true

  # ==================== ANALYSIS ====================

  - name: "Duplikate Analyse"
    description: "Sucht identische Dateien im Backup-Manifest (Excel-Export)"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/analyze_manifest_duplicates.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Analysis"
    tags: ["backup", "analysis", "duplicates", "pool"]
    estimated_duration: "5-20min"
    risk_level: "low"
    params:
      - name: manifest
        type: path
        label: "Manifest JSON"
        help: "Einzelne .json oder Ordner — bei Ordner wird die neueste Manifest-Datei verwendet"
        default: "/srv/pcloud-archive/manifests"
        required: true

      - name: output
        type: path
        label: "Excel-Ausgabe"
        default: "/srv/nas/restore/duplicates.xlsx"
        required: true

  # ==================== SECURITY (EntropyWatcher) ====================

  - name: "Permission Matrix (Samba)"
    description: "Prueft Samba-/ACL-Berechtigungen und Leak-Szenarien (permission_matrix.py)"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["permission_matrix.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Security"
    tags: ["samba", "permissions", "security", "nas"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "EW Status"
    description: "Aktueller EntropyWatcher-Status und Integritaets-Check"
    cmd: "/bin/bash"
    args: ["scripts/ew_status.sh", "/opt/apps/entropywatcher/config"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "status", "security"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "EW Forecast Next Run"
    description: "Wann laeuft der naechste EntropyWatcher-Scan?"
    cmd: "/bin/bash"
    args: ["scripts/ew_forecast_next_run.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "forecast", "scheduling"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: format
        type: select
        label: "Ausgabe-Format"
        options: ["compact", "hybrid", "full", "box"]
        default: "compact"

      - name: sort
        type: select
        label: "Sortierung"
        options: ["next", "last", "name"]
        default: "next"

  - name: "EW Backup Slot Check"
    description: "Prueft ob Backup-Slot verfuegbar ist (Kollisionsvermeidung)"
    cmd: "/bin/bash"
    args: ["scripts/ew_backup_slot_check.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "backup", "scheduling"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: offset-days
        type: int
        label: "Offset Tage (optional)"
        required: false
        arg_mode: positional

  - name: "Honeyfile Monitor"
    description: "Statuspruefung der Koeder-Dateien (Tamper-Detection)"
    cmd: "/bin/bash"
    args: ["honeyfile_monitor.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    env:
      HONEYFILE_LOG_FILE: "/dev/null"
      HONEYFILE_LAST_PROCESSED: "/tmp/honeyfile_last_alert_ts"
      HONEYFILE_ALERT_FLAG: "/tmp/honeyfile_alert"
    category: "Security"
    tags: ["entropy", "honeyfile", "tamper-detection"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "Safety Gate Status"
    description: "Prueft ob Sicherheits-Gate (Schreibschutz) aktiv ist"
    cmd: "/bin/bash"
    args: ["safety_gate.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "safety-gate", "write-protection"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: strict
        type: bool
        label: "Strict Mode (--strict)"
        default: false

  - name: "Forecast Safety Gate"
    description: "Prognostiziert wann das Safety Gate aktiv sein wird"
    cmd: "/bin/bash"
    args: ["scripts/forecast_safety_gate.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "forecast", "safety-gate"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: offset-days
        type: int
        label: "Offset Tage (optional)"
        required: false
        arg_mode: positional

  - name: "Safe Ops Repo Sync"
    description: "Synchronisiert alle Repositories via safe-ops-cli"
    cmd: "sudo"
    args: ["-u", "thomas", "bash", "/opt/apps/safe-ops-cli/main/tools/sync_repos.sh"]
    cwd: "/opt/apps/safe-ops-cli/main"
    category: "Security"
    tags: ["safe-ops", "git", "sync", "maintenance"]
    estimated_duration: "1-10min"
    risk_level: "medium"
    params:
      - name: status
        type: bool
        label: "Nur Status (--status)"
        default: false

      - name: dry-run
        type: bool
        label: "Testlauf (--dry-run)"
        default: true

  - name: "EW Graceful Shutdown"
    description: "Faehrt EntropyWatcher-Dienste kontrolliert herunter"
    cmd: "sudo"
    args: ["/opt/apps/entropywatcher/main/tools/graceful_shutdown.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    category: "Security"
    tags: ["entropy", "shutdown", "maintenance", "high-risk"]
    estimated_duration: "<1min"
    risk_level: "high"
    params:
      - name: timeout
        type: int
        label: "Timeout pro Service (Sekunden)"
        default: 1800
        min: 30
        max: 7200

      - name: dry-run
        type: bool
        label: "Dry-Run (--dry-run)"
        default: true

      - name: no-shutdown
        type: bool
        label: "Dienste laufen lassen (--no-shutdown)"
        default: false

  - name: "EW Service Check"
    description: "Prueft den Status relevanter EntropyWatcher-Services"
    cmd: "sudo"
    args: ["/opt/apps/entropywatcher/main/tools/check_services.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    category: "Security"
    tags: ["entropy", "services", "status", "monitoring"]
    estimated_duration: "<1min"
    risk_level: "low"

  # ==================== REPORTS ====================

  - name: "pCloud Aggregate Status"
    description: "Zusammenfassung aller pCloud-Backup-Status"
    cmd: "/bin/bash"
    args: ["scripts/aggregate_status.sh"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Reports"
    tags: ["backup", "status", "monitoring", "pool"]
    estimated_duration: "1-2min"
    risk_level: "low"

  - name: "pCloud Generate Reports"
    description: "Generiert detaillierte Backup-Reports (HTML/JSON) — Pool-Pipeline-Phasen"
    cmd: "/bin/bash"
    args: ["scripts/generate_reports.sh"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Reports"
    tags: ["backup", "reports", "html", "pool"]
    estimated_duration: "2-5min"
    risk_level: "low"

  - name: "pCloud Status (Last 10)"
    description: "MariaDB: letzte 10 Backup-Runs (Snapshot, Dauer, Status)"
    cmd: "/bin/bash"
    args: ["pcloud_status.sh"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    category: "Reports"
    tags: ["backup", "status", "mariadb", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "pCloud Status (Last N)"
    description: "MariaDB: letzte N Backup-Runs anzeigen"
    cmd: "/bin/bash"
    args: ["pcloud_status.sh", "--last-n"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    category: "Reports"
    tags: ["backup", "status", "mariadb", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: limit
        type: int
        label: "Anzahl Runs"
        default: 20
        min: 1
        max: 100
        arg_mode: positional

  - name: "pCloud Status (Failures)"
    description: "MariaDB: nur fehlgeschlagene Backup-Runs"
    cmd: "/bin/bash"
    args: ["pcloud_status.sh", "--failures"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    category: "Reports"
    tags: ["backup", "status", "mariadb", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "pCloud Status (30d Stats)"
    description: "MariaDB: Statistik der letzten 30 Tage (Success-Rate, Dauer, GB)"
    cmd: "/bin/bash"
    args: ["pcloud_status.sh", "--stats"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    category: "Reports"
    tags: ["backup", "status", "mariadb", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "pCloud Status (Running Now)"
    description: "MariaDB: aktuell laufender Backup inkl. Phasen"
    cmd: "/bin/bash"
    args: ["pcloud_status.sh", "--current"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    category: "Reports"
    tags: ["backup", "status", "mariadb", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "pCloud Status (HTML Report)"
    description: "MariaDB-Status als HTML-Datei erzeugen"
    cmd: "/bin/bash"
    args: ["pcloud_status.sh", "html"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    category: "Reports"
    tags: ["backup", "status", "html", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: output
        type: path
        label: "HTML-Ausgabedatei"
        default: "/srv/nas/restore/pcloud_status.html"
        arg_mode: positional

  - name: "Backup Pipeline Status"
    description: "systemd-Status von backup-pipeline.service (läuft gerade? letzter Exit?)"
    cmd: "sudo"
    args: ["systemctl", "status", "backup-pipeline.service", "--no-pager", "-l"]
    category: "Reports"
    tags: ["backup", "pipeline", "monitoring", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "Backup Pipeline Log (letzte Zeilen)"
    description: "journald: letzte Zeilen von backup-pipeline.service (RTB + Pool-Upload)"
    cmd: "sudo"
    args: ["journalctl", "-u", "backup-pipeline.service", "--no-pager", "-o", "short-iso", "-n"]
    category: "Reports"
    tags: ["backup", "pipeline", "log", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: lines
        type: int
        label: "Anzahl Zeilen"
        help: "Wie viele der letzten Journal-Zeilen anzeigen"
        default: 50
        min: 10
        max: 500
        arg_mode: positional

  - name: "Backup Pipeline Log (Pool-Phasen)"
    description: "journald gefiltert: Manifest-Fortschritt, Upload, Verify, Fehler (ohne rsync-Rauschen)"
    cmd: "sudo"
    args:
      - "bash"
      - "-lc"
      - "journalctl -u backup-pipeline.service -n \"${1:-50}\" --no-pager -o short-iso 2>/dev/null | grep -E '\\[manifest\\]|\\[upload\\]|\\[verify\\]|ERROR|pCloud|Uploading|Run ID|Preflight|Smart-Mode|MariaDB' || true"
      - "_"
    category: "Reports"
    tags: ["backup", "pipeline", "log", "pool"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: lines
        type: int
        label: "Anzahl Zeilen (vor Filter)"
        help: "Journal-Zeilen, die dann auf Pool-Phasen gefiltert werden"
        default: 80
        min: 20
        max: 1000
        arg_mode: positional

  - name: "Backup Pipeline Log (Live)"
    description: "journald Live-Ticker — läuft bis Kill/Abbruch (wie journalctl -f)"
    cmd: "sudo"
    args: ["journalctl", "-u", "backup-pipeline.service", "-f", "-o", "short-iso"]
    category: "Reports"
    tags: ["backup", "pipeline", "log", "live", "pool"]
    estimated_duration: "bis Kill"
    risk_level: "low"

  - name: "Backup Pipeline Log (Live, Pool-Phasen)"
    description: "Live-Ticker nur Manifest/Upload/Verify und Fehler — läuft bis Kill"
    cmd: "sudo"
    args:
      - "bash"
      - "-lc"
      - "journalctl -u backup-pipeline.service -f -o short-iso 2>/dev/null | grep --line-buffered -E '\\[manifest\\]|\\[upload\\]|\\[verify\\]|ERROR|pCloud|Uploading|Run ID|Preflight|Smart-Mode|MariaDB' || true"
    category: "Reports"
    tags: ["backup", "pipeline", "log", "live", "pool"]
    estimated_duration: "bis Kill"
    risk_level: "low"

