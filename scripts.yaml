# Script Manager UI - Production-Ready Script Definitions
# Focus: Operational utilities, verification, restore, and monitoring
# Excluded: Pipeline scripts (scan, init, manifest generation) - these run via systemd.timer

scripts:
  # ==================== RECOVERY (Critical Priority) ====================
  
  - name: "pCloud Restore"
    description: "Einzelne Datei/Ordner aus Backup nach /srv/restore wiederherstellen"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pcloud_restore.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Recovery"
    tags: ["backup", "restore", "recovery"]
    estimated_duration: "1-5min"
    risk_level: "low"
    params:
      - name: manifest
        type: string
        label: "Manifest-Quelle"
        help: "'pcloud' für Remote-Index oder lokaler Manifest-Pfad"
        default: "pcloud"
        required: true
      
      - name: file
        type: string
        label: "Datei-Pfad im Backup"
        help: "Vollständiger pCloud-Pfad zur wiederherzustellenden Datei"
        default: "/Backup/rtb_1to1/_snapshots/2026-04-27-173201/Thomas/Ausbildung/2018-03-0520-17-02_Kursbestätigung_Arbeitorganisation_&_Zeitmanagement.pdf"
        required: false
      
      - name: folder
        type: string
        label: "Ordner-Pfad im Backup (alternativ)"
        help: "Für rekursiven Download eines ganzen Ordners"
        required: false
      
      - name: snapshot
        type: string
        label: "Snapshot-Name (alternativ)"
        help: "z.B. 2026-04-27-173201 für vollständiges Snapshot-Restore"
        required: false
      
      - name: out_dir
        type: path
        label: "Restore-Zielverzeichnis"
        help: "Lokaler Pfad wo wiederhergestellt wird"
        default: "/srv/nas/restore"
        required: true
      
      - name: download
        type: bool
        label: "Wirklich downloaden?"
        help: "false = nur Plan anzeigen, true = tatsächlich downloaden"
        default: true
        required: false
      
      - name: verify
        type: bool
        label: "SHA256-Verifikation?"
        help: "Integrität nach Download prüfen"
        default: true
        required: false

      - name: list-snapshots
        type: bool
        label: "Snapshots auflisten"
        help: "Listet verfügbare Snapshots und beendet"
        default: false
        required: false

      - name: mode
        type: select
        label: "Restore-Modus"
        help: "flat = lokales Verzeichnis; object-store = Objekt-Speicher"
        options: ["flat", "object-store"]
        default: "flat"
        required: false

      - name: verify-only
        type: bool
        label: "Nur verifizieren"
        help: "Prüft geplante Downloads ohne Extraktion"
        default: false
        required: false

      - name: folderid
        type: int
        label: "pCloud Folder-ID (optional)"
        help: "Direktzugriff per Folder-ID statt Pfad"
        required: false

      - name: fileid
        type: int
        label: "pCloud File-ID (optional)"
        help: "Direktzugriff per File-ID statt Pfad"
        required: false

  - name: "Prepare Fresh Test"
    description: "Bereitet lokalen Testzustand vor (Snapshot behalten, Cleanup)"
    cmd: "sudo"
    args: ["bash", "/opt/apps/pcloud-tools/main/scripts/utilities/prepare_fresh_test.sh"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Recovery"
    tags: ["pcloud", "test", "cleanup", "high-risk"]
    estimated_duration: "1-3min"
    risk_level: "high"
    params:
      - name: keep-snapshot
        type: string
        label: "Snapshot behalten"
        help: "Nur dieser Snapshot bleibt lokal erhalten"
        default: "2026-04-27-173201"
        required: true

      - name: keep-local-manifest
        type: select
        label: "Lokales Manifest behalten"
        help: "yes = Keep-Manifest bleibt erhalten"
        options: ["yes", "no"]
        default: "yes"
        required: true

      - name: auto-remote-cleanup
        type: select
        label: "Auto: pCloud Remote-Cleanup"
        help: "yes = Remote-Snapshots/Index automatisch bereinigen; no = manuell"
        options: ["yes", "no"]
        default: "yes"
        required: true

      - name: auto-db-cleanup
        type: select
        label: "Auto: DB-Cleanup"
        help: "yes = DB-Run-History automatisch bereinigen; no = manuell"
        options: ["yes", "no"]
        default: "yes"
        required: true

      - name: highrisk
        type: bool
        label: "HIGH RISK bestätigt"
        help: "Pflicht bei --execute: destruktive Änderungen wurden bewusst bestätigt"
        default: false
        ui_only: true
        required_if_param_true: "execute"
        required_if_message: "Für --execute bitte zuerst HIGH RISK bestätigen."

      - name: dry-run
        type: bool
        label: "--dry-run"
        help: "Sicherer Standardmodus: zeigt nur geplante Änderungen"
        default: true
        exclusive_group: "prepare_fresh_test_mode"
        enforce_one_in_group: true

      - name: execute
        type: bool
        label: "--execute"
        help: "Führt die Änderungen wirklich aus (destruktiv)"
        default: false
        exclusive_group: "prepare_fresh_test_mode"
        enforce_one_in_group: true

  - name: "pCloud File History"
    description: "Historie einer Datei über lokale Manifeste nachverfolgen"
    cmd: "/bin/bash"
    args: ["/opt/apps/pcloud-tools/main/scripts/utilities/pcloud_file_history.sh"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Analysis"
    tags: ["pcloud", "history", "manifest"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: target
        type: string
        label: "Datei-Pfad im Backup"
        help: "Beispielpfad ist sofort ausführbar"
        default: "/Backup/rtb_1to1/_snapshots/2026-04-27-173201/Thomas/Ausbildung/2018-03-0520-17-02_Kursbestätigung_Arbeitorganisation_&_Zeitmanagement.pdf"
        required: true
        arg_mode: positional

  - name: "Smart Strategy Decision Simulator"
    description: "Offline-Simulation der Smart-Strategy Entscheidung"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "/opt/apps/pcloud-tools/main/scripts/utilities/smart_strategy_decision_simulator.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Analysis"
    tags: ["pcloud", "smart-strategy", "simulation"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: current
        type: path
        label: "Aktuelles Manifest"
        default: "/srv/pcloud-archive/manifests/2026-05-01-103649.json"
        required: true

      - name: basis
        type: path
        label: "Basis-Manifest"
        default: "/srv/pcloud-archive/manifests/2026-04-27-173201.json"
        required: true

      - name: auto
        type: bool
        label: "Auto-Modus (empfohlen)"
        help: "Ermittelt source_snapshots und stub_ratio aus realen Daten"
        default: true

      - name: index
        type: path
        label: "Index-Datei"
        help: "Master-Index für Auto-Stub-Ratio"
        default: "/srv/pcloud-archive/indexes/content_index_master.json"
        required: false

      - name: manifests-dir
        type: path
        label: "Manifest-Verzeichnis"
        help: "Auto-Zählung der Snapshots"
        default: "/srv/pcloud-archive/manifests"
        required: false

      - name: template-dir
        type: path
        label: "Template-Basisverzeichnis"
        help: "Prüft auf _template Unterordner"
        default: "/Backup/rtb_1to1"
        required: false

      - name: source-snapshots
        type: int
        label: "Source Snapshots (manuell, optional)"
        help: "Nur setzen wenn Auto-Modus aus ist"
        min: 1

      - name: stub-ratio
        type: string
        label: "Stub Ratio (manuell, optional)"
        help: "Nur setzen wenn Auto-Modus aus ist, z.B. 0.92"
        required: false

      - name: template-exists
        type: bool
        label: "Template vorhanden (manuell, optional)"
        help: "Nur setzen wenn Auto-Modus aus ist"
        default: false

      - name: template-match
        type: string
        label: "Template Match (manuell, optional)"
        help: "Nur setzen wenn Auto-Modus aus ist, z.B. 0.97"
        required: false

      - name: stub-transform-threshold
        type: string
        label: "Stub-Transform Schwellenwert (optional)"
        help: "Überschreibt den Schwellenwert für Stub-Transformation, z.B. 0.90"
        required: false

      - name: saved-calls-min
        type: int
        label: "Min. gespeicherte API-Calls (optional)"
        help: "Mindestzahl der eingesparten API-Calls für Smart-Strategie"
        required: false

      - name: template-strong-threshold
        type: string
        label: "Template-Strong Schwellenwert (optional)"
        help: "Überschreibt den starken Template-Match-Schwellenwert, z.B. 0.97"
        required: false

      - name: json-out
        type: path
        label: "JSON Ausgabe (optional)"
        help: "Simulationsergebnis als JSON-Datei speichern"
        required: false

      - name: json-only
        type: bool
        label: "Nur JSON-Ausgabe"
        help: "Unterdrückt menschenlesbare Ausgabe"
        default: false

  # ==================== BACKUP ====================
  
  - name: "RTB Backup"
    description: "Rsync Time Backup - Inkrementelles Snapshot-Backup"
    cmd: "/bin/bash"
    args: ["rtb_wrapper.sh"]
    cwd: "/opt/apps/rtb"
    category: "Backup"
    tags: ["backup", "rsync", "snapshot"]
    estimated_duration: "5-30min"
    risk_level: "high"
    params:
      - name: check-only
        type: bool
        label: "Check-Only (Dry Run)"
        help: "Nutzt --check-only: nur Änderungsprüfung, kein Lock, kein Backup"
        default: true

      - name: force
        type: bool
        label: "Force Backup"
        help: "Überspringt Safety-Gate und erzwungenen Lauf via --force"
        default: false

      - name: upload-only
        type: path
        label: "Upload-Only: Snapshot-Pfad (optional)"
        help: "Direkt-Upload eines bestehenden Snapshots nach pCloud ohne neues RTB-Backup"
        required: false

  - name: "pCloud Simple Upload"
    description: "Ad-hoc Upload von Datei/Ordner nach pCloud (parallel, mit optionalem Delta-Check)"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "pcloud_simple_upload.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Backup"
    tags: ["pcloud", "upload", "adhoc"]
    estimated_duration: "1-30min"
    risk_level: "medium"
    params:
      - name: env-file
        type: path
        label: ".env Datei"
        help: "Pfad zur .env mit PCLOUD_TOKEN/API-Config"
        default: "/opt/apps/pcloud-tools/main/.env"
        required: true

      - name: source
        type: path
        label: "Quelle (lokal)"
        help: "Datei oder Ordner, der hochgeladen werden soll"
        required: true

      - name: destination
        type: string
        label: "Ziel (pCloud)"
        help: "pCloud Zielordner, z.B. /Backup/rtb_1to1/_adhoc/"
        default: "/Backup/rtb_1to1/_adhoc/"
        required: true

      - name: no-delta-check
        type: bool
        label: "Delta-Check überspringen"
        help: "Aktiviert --no-delta-check"
        default: false

      - name: no-auto-download
        type: bool
        label: "Kein Auto-Download pcloud_bin_lib.py"
        help: "Aktiviert --no-auto-download"
        default: false

      - name: lib-path
        type: path
        label: "Custom pcloud_bin_lib.py (optional)"
        help: "Nur nötig bei Sonder-Setups"
        required: false

  - name: "microSD Raw Image Backup (dd)"
    description: "Erstellt ein 1:1 Raw-Image der microSD nach /mnt/backup (destruktiv bei falschem Device)"
    cmd: "sudo"
    args:
      - "bash"
      - "-lc"
      - "OUT_PATH=\"$1\"; if [ -z \"$OUT_PATH\" ]; then OUT_PATH=\"/mnt/backup/rpi5-Radxa_SATA_HAT_microsd-live-backup-$(date +%Y%m%d-%H%M%S).img\"; fi; OUT_PATH=\"${OUT_PATH/AUTO_TIMESTAMP/$(date +%Y%m%d-%H%M%S)}\"; dd if=/dev/mmcblk0 of=\"$OUT_PATH\" bs=4M status=progress conv=fsync"
      - "_"
    cwd: "/opt/apps"
    category: "Backup"
    tags: ["backup", "image", "dd", "high-risk"]
    estimated_duration: "10-60min"
    risk_level: "high"
    params:
      - name: output-path
        type: path
        label: "Output Image Pfad"
        help: "Default-Vorschlag: /mnt/backup/rpi5-Radxa_SATA_HAT_microsd-live-backup-AUTO_TIMESTAMP.img"
        default: "/mnt/backup/rpi5-Radxa_SATA_HAT_microsd-live-backup-AUTO_TIMESTAMP.img"
        required: false
        arg_mode: positional

      - name: highrisk
        type: bool
        label: "HIGH RISK bestätigt"
        help: "Pflicht: dd liest raw vom Blockdevice; if/of müssen korrekt sein"
        default: false
        ui_only: true
        required: true

  # ==================== VERIFICATION & INTEGRITY ====================
  
  - name: "pCloud Quick Delta"
    description: "Schnelle Tamper-Detection für pCloud-Backups"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "pcloud_quick_delta.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["backup", "verification", "integrity"]
    estimated_duration: "2-5min"
    risk_level: "low"
    params:
      - name: dest_root
        type: string
        label: "pCloud Basispfad"
        help: "z.B. /Backup/rtb_1to1"
        required: true
        default: "/Backup/rtb_1to1"
      
      - name: index_file
        type: string
        label: "Index-Datei"
        help: "content_index.json oder Archive z.B. 2026-04-10-075334_index.json"
        required: false
        default: "content_index.json"
      
      - name: backfill_check
        type: bool
        label: "SHA256 Backfill-Check"
        help: "Gründlicherer Check für Lücken (langsamer)"
        default: false
      
      - name: json_out
        type: path
        label: "JSON Report Ausgabe"
        help: "Optional: Report als JSON speichern"
        required: false

      - name: backfill-sample
        type: int
        label: "Backfill-Stichproben"
        help: "Anzahl Dateien für SHA-Backfill (0 = deaktiviert)"
        default: 0
        min: 0

      - name: env-file
        type: path
        label: ".env Datei (optional)"
        help: "Überschreibt die Standard-.env"
        required: false

      - name: profile
        type: string
        label: "Profil (optional)"
        help: "Konfig-Profil für pCloud-Verbindung"
        required: false

  - name: "pCloud Integrity Check"
    description: "Verifiziert Stub-Dateien gegen content_index.json"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pcloud_integrity_check.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["backup", "integrity", "verification"]
    estimated_duration: "5-15min"
    risk_level: "low"
    params:
      - name: dest_root
        type: path
        label: "pCloud Backup Root"
        help: "z.B. /Backup/rtb_1to1"
        required: true
        default: "/Backup/rtb_1to1"
      
      - name: stub_sample
        type: int
        label: "Stub-Stichproben pro Snapshot"
        help: "Anzahl Stub-Dateien zu pr\u00fcfen (0 = alle)"
        default: 50
        min: 0
      
      - name: checksum_sample
        type: int
        label: "Checksum-Stichproben"
        help: "Anzahl Index-Checksums zu prüfen (0 = alle) - sequenziell, ca. 20-30s pro File!"
        default: 10
        min: 0

      - name: json-out
        type: path
        label: "JSON Report Ausgabe (optional)"
        help: "Speichert Ergebnis als JSON"
        required: false

      - name: stubs-mode
        type: select
        label: "Stubs-Modus"
        help: "Wie werden Stub-Dateien verarbeitet"
        options: ["separate", "combined", "both"]
        default: "separate"

      - name: level
        type: select
        label: "Prüf-Level"
        help: "FAST = nur Metadaten; FILEID = ID-Match; SHA = voller Checksum"
        options: ["FAST", "FILEID", "SHA"]
        default: "FILEID"

      - name: dry-run
        type: bool
        label: "Dry-Run"
        help: "Zeigt Probleme ohne Korrekturen"
        default: true
        exclusive_group: "integrity_mode"
        enforce_one_in_group: true

      - name: autofix-safe
        type: bool
        label: "AutoFix (nur sichere Fixes)"
        help: "Behebt nur sichere Probleme automatisch (kein Datenverlust möglich)"
        default: false
        exclusive_group: "integrity_mode"
        enforce_one_in_group: true
        ui_only: true
        required_if_message: "AutoFix: bitte HIGH-RISK-Implikationen prüfen."

  - name: "Verify Index vs Manifests"
    description: "Vergleicht content_index.json mit lokalen JSON-Manifesten"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/pcloud_verify_index_vs_manifests.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["backup", "verification", "index"]
    estimated_duration: "2-5min"
    risk_level: "low"
    params:
      - name: dest_root
        type: path
        label: "pCloud Backup Root"
        required: true
        default: "/Backup/rtb_1to1"
      
      - name: manifest_dir
        type: path
        label: "Lokale Manifest-Verzeichnis"
        help: "Wo liegen die lokalen .json Manifeste?"
        required: true

      - name: index-file
        type: string
        label: "Index-Datei"
        help: "Name der Index-Datei (Standard: content_index.json)"
        default: "content_index.json"
        required: false

      - name: env-file
        type: path
        label: ".env Datei (optional)"
        help: "Überschreibt die Standard-.env"
        required: false

      - name: profile
        type: string
        label: "Profil (optional)"
        help: "Konfig-Profil für pCloud-Verbindung"
        required: false

      - name: json-out
        type: path
        label: "JSON Report Ausgabe (optional)"
        help: "Speichert Ergebnis als JSON"
        required: false

  # ==================== ANALYSIS ====================
  
  - name: "Duplikate Analyse"
    description: "Sucht identische Dateien im Backup-Manifest (Excel-Export)"
    cmd: "/opt/apps/pcloud-tools/venv/bin/python3"
    args: ["-u", "scripts/utilities/analyze_manifest_duplicates.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    env_file: ".env"
    env:
      PYTHONPATH: "/opt/apps/pcloud-tools:/opt/apps/pcloud-tools/main"
    category: "Analysis"
    tags: ["backup", "analysis", "duplicates"]
    estimated_duration: "5-20min"
    risk_level: "low"
    params:
      - name: manifest
        type: path
        label: "Manifest JSON"
        help: "Pfad zu einer Manifest-Datei ODER zu einem Manifest-Ordner (neueste .json wird verwendet)"
        required: true
      
      - name: output
        type: path
        label: "Excel-Ausgabe"
        help: "Pfad zur Excel-Datei (SMB-erreichbar z.B. unter /srv/nas/restore)"
        default: "/srv/nas/restore/duplicates.xlsx"
        required: true

  # ==================== SECURITY (EntropyWatcher) ====================
  
  - name: "EW Status"
    description: "Aktueller EntropyWatcher-Status und Integritäts-Check"
    cmd: "/bin/bash"
    args: ["scripts/ew_status.sh", "/opt/apps/entropywatcher/config"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "status", "security"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "EW Forecast Next Run"
    description: "Wann läuft der nächste EntropyWatcher-Scan?"
    cmd: "/bin/bash"
    args: ["scripts/ew_forecast_next_run.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "forecast", "scheduling"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: format
        type: select
        label: "Ausgabe-Format"
        options: ["compact", "hybrid", "full", "box"]
        default: "compact"

      - name: sort
        type: select
        label: "Sortierung"
        options: ["next", "last", "name"]
        default: "next"

  - name: "EW Backup Slot Check"
    description: "Prüft ob Backup-Slot verfügbar ist (Kollisionsvermeidung)"
    cmd: "/bin/bash"
    args: ["scripts/ew_backup_slot_check.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "backup", "scheduling"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: offset-days
        type: int
        label: "Offset Tage (optional)"
        help: "Manuelle Verschiebung in Tagen (Standard: auto aus timer)"
        required: false
        arg_mode: positional

  - name: "Honeyfile Monitor"
    description: "Statusprüfung der Köder-Dateien (Tamper-Detection)"
    cmd: "/bin/bash"
    args: ["honeyfile_monitor.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    env:
      HONEYFILE_LOG_FILE: "/dev/null"
      HONEYFILE_LAST_PROCESSED: "/tmp/honeyfile_last_alert_ts"
      HONEYFILE_ALERT_FLAG: "/tmp/honeyfile_alert"
    category: "Security"
    tags: ["entropy", "honeyfile", "tamper-detection"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "Safety Gate Status"
    description: "Prüft ob Sicherheits-Gate (Schreibschutz) aktiv ist"
    cmd: "/bin/bash"
    args: ["safety_gate.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "safety-gate", "write-protection"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: strict
        type: bool
        label: "Strict Mode (--strict)"
        help: "Blockiert auch bei YELLOW-Status"
        default: false

  - name: "Forecast Safety Gate"
    description: "Prognostiziert wann das Safety Gate aktiv sein wird"
    cmd: "/bin/bash"
    args: ["scripts/forecast_safety_gate.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "forecast", "safety-gate"]
    estimated_duration: "<1min"
    risk_level: "low"
    params:
      - name: offset-days
