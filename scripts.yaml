# Script Manager UI - Production-Ready Script Definitions
# Focus: Operational utilities, verification, restore, and monitoring
# Excluded: Pipeline scripts (scan, init, manifest generation) - these run via systemd.timer

scripts:
  # ==================== RECOVERY (Critical Priority) ====================
  
  - name: "pCloud Restore"
    description: "Einzelne Datei/Ordner aus Backup nach /srv/restore wiederherstellen"
    cmd: "python3"
    args: ["scripts/utilities/pcloud_restore.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Recovery"
    tags: ["backup", "restore", "recovery"]
    estimated_duration: "1-5min"
    risk_level: "low"
    params:
      - name: source_path
        type: string
        label: "Pfad im Backup"
        help: "z.B. /Backup/rtb_1to1/_snapshots/2026-04-27-173201/Thomas/Dokumente/file.pdf"
        required: true
      
      - name: dest_dir
        type: path
        label: "Restore-Zielverzeichnis"
        help: "Lokaler Pfad wo die Datei wiederhergestellt wird"
        default: "/srv/restore"
        required: true

  # ==================== BACKUP ====================
  
  - name: "RTB Backup"
    description: "Rsync Time Backup - Inkrementelles Snapshot-Backup"
    cmd: "/bin/bash"
    args: ["rtb_wrapper.sh"]
    cwd: "/opt/apps/rtb"
    category: "Backup"
    tags: ["backup", "rsync", "snapshot"]
    estimated_duration: "5-30min"
    risk_level: "high"
    params:
      - name: dry_run
        type: bool
        label: "Dry Run (Simulation)"
        help: "Führt nur Simulation aus, keine echten Änderungen"
        default: true
      
      - name: source
        type: path
        label: "Quellverzeichnis"
        required: true
      
      - name: destination
        type: path
        label: "Zielverzeichnis"
        required: true

  # ==================== VERIFICATION & INTEGRITY ====================
  
  - name: "pCloud Quick Delta"
    description: "Schnelle Tamper-Detection für pCloud-Backups"
    cmd: "python3"
    args: ["pcloud_quick_delta.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["backup", "verification", "integrity"]
    estimated_duration: "2-5min"
    risk_level: "low"
    params:
      - name: dest_root
        type: string
        label: "pCloud Basispfad"
        help: "z.B. /Backup/rtb_1to1"
        required: true
        default: "/Backup/rtb_1to1"
      
      - name: index_file
        type: string
        label: "Index-Datei"
        help: "content_index.json oder Archive z.B. 2026-04-10-075334_index.json"
        required: false
        default: "content_index.json"
      
      - name: backfill_check
        type: bool
        label: "SHA256 Backfill-Check"
        help: "Gründlicherer Check für Lücken (langsamer)"
        default: false
      
      - name: json_out
        type: path
        label: "JSON Report Ausgabe"
        help: "Optional: Report als JSON speichern"
        required: false

  - name: "pCloud Integrity Check"
    description: "Verifiziert Stub-Dateien gegen content_index.json"
    cmd: "python3"
    args: ["scripts/utilities/pcloud_integrity_check.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["backup", "integrity", "verification"]
    estimated_duration: "5-15min"
    risk_level: "low"
    params:
      - name: dest_root
        type: path
        label: "pCloud Backup Root"
        help: "z.B. /Backup/rtb_1to1"
        required: true
        default: "/Backup/rtb_1to1"
      
      - name: verify_random
        type: int
        label: "Stichproben-Anzahl"
        help: "0 = alle Dateien prüfen"
        default: 0
        min: 0

  - name: "Verify Index vs Manifests"
    description: "Vergleicht content_index.json mit lokalen JSON-Manifesten"
    cmd: "python3"
    args: ["scripts/utilities/pcloud_verify_index_vs_manifests.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Verification"
    tags: ["backup", "verification", "index"]
    estimated_duration: "2-5min"
    risk_level: "low"
    params:
      - name: dest_root
        type: path
        label: "pCloud Backup Root"
        required: true
        default: "/Backup/rtb_1to1"
      
      - name: local_manifests_dir
        type: path
        label: "Lokale Manifest-Verzeichnis"
        help: "Wo liegen die lokalen .json Manifeste?"
        required: true

  # ==================== ANALYSIS ====================
  
  - name: "Duplikate Analyse"
    description: "Sucht identische Dateien im Backup-Manifest (Excel-Export)"
    cmd: "python3"
    args: ["scripts/analyze_manifest_duplicates.py"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Analysis"
    tags: ["backup", "analysis", "duplicates"]
    estimated_duration: "5-20min"
    risk_level: "low"
    params:
      - name: manifest_path
        type: path
        label: "Manifest JSON"
        help: "Pfad zum content_index.json oder manifest.json"
        required: true
      
      - name: output
        type: path
        label: "Excel-Ausgabe"
        help: "Pfad zur Excel-Datei"
        default: "/tmp/duplicates.xlsx"
        required: true

  # ==================== SECURITY (EntropyWatcher) ====================
  
  - name: "EW Status"
    description: "Aktueller EntropyWatcher-Status und Integritäts-Check"
    cmd: "/bin/bash"
    args: ["scripts/ew_status.sh", "/opt/apps/entropywatcher/config"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "status", "security"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "EW Forecast Next Run"
    description: "Wann läuft der nächste EntropyWatcher-Scan?"
    cmd: "/bin/bash"
    args: ["scripts/ew_forecast_next_run.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "forecast", "scheduling"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "EW Backup Slot Check"
    description: "Prüft ob Backup-Slot verfügbar ist (Kollisionsvermeidung)"
    cmd: "/bin/bash"
    args: ["scripts/ew_backup_slot_check.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "backup", "scheduling"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "Honeyfile Monitor"
    description: "Statusprüfung der Köder-Dateien (Tamper-Detection)"
    cmd: "/bin/bash"
    args: ["honeyfile_monitor.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    env:
      HONEYFILE_LOG_FILE: "/dev/null"
      HONEYFILE_LAST_PROCESSED: "/tmp/honeyfile_last_alert_ts"
      HONEYFILE_ALERT_FLAG: "/tmp/honeyfile_alert"
    category: "Security"
    tags: ["entropy", "honeyfile", "tamper-detection"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "Safety Gate Status"
    description: "Prüft ob Sicherheits-Gate (Schreibschutz) aktiv ist"
    cmd: "/bin/bash"
    args: ["safety_gate.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "safety-gate", "write-protection"]
    estimated_duration: "<1min"
    risk_level: "low"

  - name: "Forecast Safety Gate"
    description: "Prognostiziert wann das Safety Gate aktiv sein wird"
    cmd: "/bin/bash"
    args: ["scripts/forecast_safety_gate.sh"]
    cwd: "/opt/apps/entropywatcher/main"
    env_file: "../config/common.env"
    category: "Security"
    tags: ["entropy", "forecast", "safety-gate"]
    estimated_duration: "<1min"
    risk_level: "low"

  # ==================== REPORTS ====================
  
  - name: "pCloud Aggregate Status"
    description: "Zusammenfassung aller pCloud-Backup-Status"
    cmd: "/bin/bash"
    args: ["scripts/aggregate_status.sh"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Reports"
    tags: ["backup", "status", "monitoring"]
    estimated_duration: "1-2min"
    risk_level: "low"

  - name: "pCloud Generate Reports"
    description: "Generiert detaillierte Backup-Reports (HTML/JSON)"
    cmd: "/bin/bash"
    args: ["scripts/generate_reports.sh"]
    cwd: "/opt/apps/pcloud-tools/main"
    category: "Reports"
    tags: ["backup", "reports", "html"]
    estimated_duration: "2-5min"
    risk_level: "low"

# Parameter-Typen:
# - string: Einfaches Textfeld
# - int: Zahleneingabe (mit min/max)
# - bool: Checkbox
# - path: Textfeld mit Pfad-Validierung
# - select: Dropdown (options erforderlich)
